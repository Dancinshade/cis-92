apiVersion: v1
kind: Pod
metadata:
  name: django
  labels:
    function: app
spec:
  containers:
  - name: django
    image: ghcr.io/dancinshade/cis-92:milestone-10.1
    ports:
    - containerPort: 8080
    resources:
      requests:
        cpu: 1000m 
        memory: 512Mi
        ephemeral-storage: 10Mi
      limits:
        cpu: 1000m 
        memory: 512Mi
        ephemeral-storage: 10Mi
    envFrom:
     - configMapRef:
        name: mysite-config
     - secretRef:
        name: mysite-secrets
    volumeMounts:
    - name: db
      mountPath: /data
  volumes:
      - name: db
        persistentVolumeClaim:
            claimName: mysite-data
  securityContext:
    fsGroup: 1000

  