apiVersion: v1
kind: Pod
metadata:
  name: django
  labels:
    function: app
spec:
  containers:
  - name: django
    image: ghcr.io/dancinshade/cis-92:latest
    ports:
    - containerPort: 8080
    resources:
      requests:
        cpu: 250m 
        memory: 512Mi
        ephemeral-storage: 10Mi
      limits:
        cpu: 250m 
        memory: 512Mi
        ephemeral-storage: 10Mi
    env:
    - name: STUDENT_NAME
      value: "Arrena Shoemaker"
    - name: SITE_NAME
      value: "www.greengoblin.com"
    - name: SECRET_KEY 
      value: "d0n7u537h15"
    - name: DEBUG
      value: "1"
    - name: DATA_DIR
      value: "/data"
    - name: PORT
      value: "8080"
    - name: DJANGO_SUPERUSER_NAME
      value: "test"
    - name: DJANGO_SUPERUSER_EMAIL
      value: "test@test.test"
    - name: DJANOGO_SUPERUSER_PASSWORD
      value: "test"

  